<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reklam Gelir Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F4F3EF;
    --surface:  #FFFFFF;
    --surface2: #EEECE7;
    --border:   #E0DDD6;
    --text:     #1A1916;
    --muted:    #7A7870;
    --hint:     #B0AEA8;
    --accent:   #1A1916;
    --blue:     #2A5FD4;
    --purple:   #6B5CE7;
    --green:    #2E8A4A;
    --teal:     #0F7B6C;
    --orange:   #C44B1B;
    --red:      #B84242;
    --android:  #1D9E75;
    --ios:      #534AB7;
    --banner-bg: #EBF2FD;
    --banner-tx: #1A3D8A;
    --inter-bg:  #F0EEFE;
    --inter-tx:  #3C3489;
    --video-bg:  #E8F5ED;
    --video-tx:  #1B5E35;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    color: var(--muted);
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }

  .filters-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .filters-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 1rem;
  }
  .frow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .frow:last-child { margin-bottom: 0; }
  .flabel {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    width: 64px;
    flex-shrink: 0;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 5px 13px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.4;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .by.on { background: var(--blue);   color: #fff; border-color: var(--blue); }
  .bm.on { background: var(--teal);   color: #fff; border-color: var(--teal); }
  .bb.on { background: var(--text);   color: #fff; border-color: var(--text); }
  .bf.on { background: var(--purple); color: #fff; border-color: var(--purple); }
  .bp.on { background: var(--orange); color: #fff; border-color: var(--orange); }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }
  .card-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card-value {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  .card-sub {
    font-size: 11px;
    color: var(--hint);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .section { margin-bottom: 1.5rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--hint);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 900px; }
  th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--hint);
    text-align: left;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th.r { text-align: right; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  td.r { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .bn { background: var(--banner-bg); color: var(--banner-tx); }
  .bi { background: var(--inter-bg);  color: var(--inter-tx); }
  .bv { background: var(--video-bg);  color: var(--video-tx); }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; margin-right: 5px; vertical-align: middle;
  }
  .da { background: var(--android); }
  .di { background: var(--ios); }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }
  .chart-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 0.75rem;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .li { display: flex; align-items: center; gap: 5px; }
  .ls { width: 9px; height: 9px; border-radius: 2px; }
  .cw { position: relative; width: 100%; height: 220px; }

  .empty {
    text-align: center;
    padding: 2.5rem;
    color: var(--hint);
    font-size: 13px;
  }
  .loader, .error {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 13px;
  }
  .error { color: var(--red); }

  .brand-strong { font-weight: 500; }

  .footer {
    text-align: center;
    padding: 2rem 0 0;
    font-size: 11px;
    color: var(--hint);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Reklam Gelir Dashboard</h1>
    <p>Marka · Platform · Format · Ay bazlı analiz</p>
  </div>
  <span class="header-badge" id="headerBadge">Yükleniyor…</span>
</div>

<div class="container" id="root">
  <div class="loader" id="loader">Veri yükleniyor…</div>
</div>

<script>
var ML  = {jan:'Ocak',feb:'Şubat',mar:'Mart',apr:'Nisan',may:'Mayıs',jun:'Haziran',
           jul:'Temmuz',aug:'Ağustos',sep:'Eylül',oct:'Ekim',nov:'Kasım',dec:'Aralık'};
var MONTHS_ORDER = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
var BL = {hurriyet:'Hürriyet',milliyet:'Milliyet',fanatik:'Fanatik',posta:'Posta',cnnturk:'CNN Türk',kanald:'Kanal D'};
var FL = {banner:'Banner',interstitial:'Interstitial',video:'Video'};
var BRANDS = ['hurriyet','milliyet','fanatik','posta','cnnturk','kanald'];
var FMTS   = ['banner','interstitial','video'];
var FC = {banner:'#2A5FD4',interstitial:'#6B5CE7',video:'#2E8A4A'};
var PC = {android:'#1D9E75',ios:'#534AB7'};

var DATA = [];
var YEARS = [];
var sel = {year:null,month:'all',brand:'all',format:'all',platform:'all'};
var ch1=null, ch2=null;

fetch('data.json?v=' + Date.now())
  .then(function(r){ if(!r.ok) throw new Error('data.json bulunamadı'); return r.json(); })
  .then(function(json){
    DATA = (json.rows || []).map(function(r){
      return {
        b:r.b, p:r.p, f:r.f, y:r.y, m:r.m,
        r:+r.r||0, ax:+r.ax||0, e:+r.e||0, ae:+r.ae||0,
        imp:+r.imp||0, aimp:+r.aimp||0
      };
    });
    YEARS = Array.from(new Set(DATA.map(function(r){return r.y;}))).sort();
    if (!YEARS.length) { showError('Veri boş görünüyor.'); return; }
    sel.year = YEARS[YEARS.length - 1];
    initUI();
    render();
  })
  .catch(function(err){
    showError('Veri yüklenemedi: ' + err.message);
  });

function showError(msg){
  document.getElementById('root').innerHTML = '<div class="error">⚠ ' + msg + '</div>';
  document.getElementById('headerBadge').textContent = 'Hata';
}

function initUI(){
  var yearBtns = YEARS.map(function(y){
    return '<button class="btn by'+(y===sel.year?' on':'')+'" data-t="year" data-v="'+y+'">'+y+'</button>';
  }).join('');

  var monthBtns = '<button class="btn bm on" data-t="month" data-v="all">Tümü</button>' +
    MONTHS_ORDER.map(function(m){
      return '<button class="btn bm" data-t="month" data-v="'+m+'">'+ML[m]+'</button>';
    }).join('');

  var brandBtns = '<button class="btn bb on" data-t="brand" data-v="all">Tümü</button>' +
    BRANDS.map(function(b){
      return '<button class="btn bb" data-t="brand" data-v="'+b+'">'+BL[b]+'</button>';
    }).join('');

  var fmtBtns = '<button class="btn bf on" data-t="format" data-v="all">Tümü</button>' +
    FMTS.map(function(f){
      return '<button class="btn bf" data-t="format" data-v="'+f+'">'+FL[f]+'</button>';
    }).join('');

  var platBtns = '<button class="btn bp on" data-t="platform" data-v="all">Tümü</button>' +
    '<button class="btn bp" data-t="platform" data-v="android">Android</button>' +
    '<button class="btn bp" data-t="platform" data-v="ios">iOS</button>';

  document.getElementById('root').innerHTML =
    '<div class="filters-panel">' +
      '<p class="filters-title">Filtreler</p>' +
      '<div class="frow"><span class="flabel">Yıl</span>' + yearBtns + '</div>' +
      '<div class="frow"><span class="flabel">Ay</span>' + monthBtns + '</div>' +
      '<div class="frow"><span class="flabel">Marka</span>' + brandBtns + '</div>' +
      '<div class="frow"><span class="flabel">Format</span>' + fmtBtns + '</div>' +
      '<div class="frow"><span class="flabel">Platform</span>' + platBtns + '</div>' +
    '</div>' +
    '<div class="cards" id="cards"></div>' +
    '<div class="section">' +
      '<div class="section-header"><span class="section-title">Detay tablosu</span><span class="section-line"></span></div>' +
      '<div class="table-wrap"><table><thead><tr>' +
        '<th>Marka</th><th>Platform</th><th>Format</th><th>Ay</th>' +
        '<th class="r">Toplam Gelir</th><th class="r">ADX Gelir</th>' +
        '<th class="r">ADX%</th>' +
        '<th class="r">Toplam Gösterim</th>' +
        '<th class="r">eCPM</th><th class="r">ADX eCPM</th>' +
      '</tr></thead><tbody id="tbody"></tbody></table></div>' +
    '</div>' +
    '<div class="section">' +
      '<div class="section-header"><span class="section-title">Görsel analiz</span><span class="section-line"></span></div>' +
      '<div class="charts-grid">' +
        '<div class="chart-card">' +
          '<p class="chart-title">Gelir karşılaştırması (₺)</p>' +
          '<div class="legend" id="leg1"></div>' +
          '<div class="cw"><canvas id="c1" role="img" aria-label="Gelir karşılaştırması"></canvas></div>' +
        '</div>' +
        '<div class="chart-card">' +
          '<p class="chart-title">Ortalama eCPM (₺)</p>' +
          '<div class="legend" id="leg2"></div>' +
          '<div class="cw"><canvas id="c2" role="img" aria-label="eCPM karşılaştırması"></canvas></div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="footer">Dahili kullanım · Tüm tutarlar TRY</div>';

  updateHeaderBadge();

  document.querySelectorAll('.btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var t = btn.dataset.t, v = btn.dataset.v;
      sel[t] = (t === 'year') ? parseInt(v, 10) : v;
      document.querySelectorAll('.btn[data-t="'+t+'"]').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      if (t === 'year') updateHeaderBadge();
      render();
    });
  });
}

function updateHeaderBadge(){
  var monthsInYear = Array.from(new Set(
    DATA.filter(function(r){return r.y===sel.year;}).map(function(r){return r.m;})
  ));
  monthsInYear.sort(function(a,b){ return MONTHS_ORDER.indexOf(a) - MONTHS_ORDER.indexOf(b); });
  if (!monthsInYear.length) {
    document.getElementById('headerBadge').textContent = sel.year;
    return;
  }
  var first = ML[monthsInYear[0]], last = ML[monthsInYear[monthsInYear.length-1]];
  var text = (first === last) ? first + ' ' + sel.year : first + ' – ' + last + ' ' + sel.year;
  document.getElementById('headerBadge').textContent = text;
}

function filtered(){
  return DATA.filter(function(r){
    return  r.y === sel.year &&
           (sel.month==='all'    || r.m===sel.month) &&
           (sel.brand==='all'    || r.b===sel.brand) &&
           (sel.format==='all'   || r.f===sel.format) &&
           (sel.platform==='all' || r.p===sel.platform);
  });
}

function T(v){return '₺'+Math.round(v).toLocaleString('tr-TR');}
function E(v){return '₺'+v.toFixed(2);}
function Big(v){return v>=1e6?'₺'+(v/1e6).toFixed(2)+'M':T(v);}
function Pct(r,a){return r>0?Math.round(a/r*100)+'%':'-';}
function N(v){return v.toLocaleString('tr-TR');}
function s(arr,k){return arr.reduce(function(t,x){return t+x[k];},0);}
function av(arr,k){return arr.length?s(arr,k)/arr.length:0;}

function monthCount(f){
  return new Set(f.map(function(r){return r.m;})).size;
}

function weightedEcpm(f, revKey, impKey){
  var totalRev = s(f, revKey);
  var totalImp = s(f, impKey);
  return totalImp > 0 ? (totalRev / totalImp) * 1000 : 0;
}

function render(){
  var f=filtered();
  var tot=s(f,'r'),adxt=s(f,'ax');
  var mc = monthCount(f);
  var avgMonthly = mc > 0 ? tot / mc : 0;
  var avgEcpm = weightedEcpm(f, 'r', 'imp');

  document.getElementById('cards').innerHTML=
    '<div class="card"><p class="card-label">Toplam Gelir</p><p class="card-value">'+Big(tot)+'</p><p class="card-sub">seçili filtre</p></div>'+
    '<div class="card"><p class="card-label">Aylık Ortalama Gelir</p><p class="card-value">'+Big(avgMonthly)+'</p><p class="card-sub">'+mc+' ay</p></div>'+
    '<div class="card"><p class="card-label">ADX Oranı</p><p class="card-value">'+(tot>0?Math.round(adxt/tot*100)+'%':'-')+'</p><p class="card-sub">'+T(adxt)+'</p></div>'+
    '<div class="card"><p class="card-label">Ortalama eCPM</p><p class="card-value">'+(avgEcpm>0?E(avgEcpm):'-')+'</p><p class="card-sub">ağırlıklı</p></div>';

  var tbody=document.getElementById('tbody');
  if(!f.length){tbody.innerHTML='<tr><td colspan="10" class="empty">Veri bulunamadı</td></tr>';}
  else tbody.innerHTML=f.map(function(r){
    return '<tr>'+
      '<td><span class="brand-strong">'+BL[r.b]+'</span></td>'+
      '<td><span class="dot '+(r.p==='android'?'da':'di')+'"></span>'+(r.p==='android'?'Android':'iOS')+'</td>'+
      '<td><span class="badge '+(r.f==='banner'?'bn':r.f==='interstitial'?'bi':'bv')+'">'+FL[r.f]+'</span></td>'+
      '<td>'+ML[r.m]+'</td>'+
      '<td class="r">'+T(r.r)+'</td>'+
      '<td class="r">'+T(r.ax)+'</td>'+
      '<td class="r">'+Pct(r.r,r.ax)+'</td>'+
      '<td class="r">'+N(r.imp)+'</td>'+
      '<td class="r">'+E(r.e)+'</td>'+
      '<td class="r">'+E(r.ae)+'</td>'+
    '</tr>';
  }).join('');

  var bLabels=BRANDS.map(function(b){return BL[b];});
  var onlyFmt=sel.format!=='all',onlyPlat=sel.platform!=='all';
  var revDS,ecDS,leg1,leg2;

  function ecpmForGroup(arr){
    var rv = s(arr, 'r'), ip = s(arr, 'imp');
    return ip > 0 ? +((rv/ip)*1000).toFixed(2) : 0;
  }

  if(onlyFmt&&onlyPlat){
    var c=PC[sel.platform];
    revDS=[{label:FL[sel.format],data:BRANDS.map(function(b){return s(f.filter(function(r){return r.b===b;}),'r');}),backgroundColor:c,borderRadius:4}];
    ecDS=[{label:'eCPM',data:BRANDS.map(function(b){return ecpmForGroup(f.filter(function(r){return r.b===b;}));}),backgroundColor:c,borderRadius:4}];
    leg1='<span class="li"><span class="ls" style="background:'+c+'"></span>'+(sel.platform==='android'?'Android':'iOS')+'</span>';
    leg2=leg1;
  } else if(onlyFmt){
    revDS=['android','ios'].map(function(pl){return{label:pl==='android'?'Android':'iOS',data:BRANDS.map(function(b){return s(f.filter(function(r){return r.b===b&&r.p===pl;}),'r');}),backgroundColor:PC[pl],borderRadius:4};});
    ecDS=['android','ios'].map(function(pl){return{label:(pl==='android'?'Android':'iOS'),data:BRANDS.map(function(b){return ecpmForGroup(f.filter(function(r){return r.b===b&&r.p===pl;}));}),backgroundColor:PC[pl],borderRadius:4};});
    leg1='<span class="li"><span class="ls" style="background:'+PC.android+'"></span>Android</span><span class="li"><span class="ls" style="background:'+PC.ios+'"></span>iOS</span>';
    leg2=leg1;
  } else if(onlyPlat){
    revDS=FMTS.map(function(ft){return{label:FL[ft],data:BRANDS.map(function(b){return s(f.filter(function(r){return r.b===b&&r.f===ft;}),'r');}),backgroundColor:FC[ft],borderRadius:4};});
    ecDS=FMTS.map(function(ft){return{label:FL[ft],data:BRANDS.map(function(b){return ecpmForGroup(f.filter(function(r){return r.b===b&&r.f===ft;}));}),backgroundColor:FC[ft],borderRadius:4};});
    leg1=FMTS.map(function(ft){return'<span class="li"><span class="ls" style="background:'+FC[ft]+'"></span>'+FL[ft]+'</span>';}).join('');
    leg2=leg1;
  } else {
    revDS=FMTS.map(function(ft){return{label:FL[ft],data:BRANDS.map(function(b){return s(f.filter(function(r){return r.b===b&&r.f===ft;}),'r');}),backgroundColor:FC[ft],borderRadius:4};});
    ecDS=FMTS.map(function(ft){return{label:FL[ft],data:BRANDS.map(function(b){return ecpmForGroup(f.filter(function(r){return r.b===b&&r.f===ft;}));}),backgroundColor:FC[ft],borderRadius:4};});
    leg1=FMTS.map(function(ft){return'<span class="li"><span class="ls" style="background:'+FC[ft]+'"></span>'+FL[ft]+'</span>';}).join('');
    leg2=leg1;
  }

  document.getElementById('leg1').innerHTML=leg1;
  document.getElementById('leg2').innerHTML=leg2;

  var xCfg={grid:{display:false},ticks:{font:{size:11},color:'#7A7870'}};
  var opts=function(yCb){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:xCfg,y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#7A7870',callback:yCb}}}};};

  if(ch1)ch1.destroy();
  if(ch2)ch2.destroy();
  ch1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:bLabels,datasets:revDS},options:opts(function(v){return v>=1e6?'₺'+(v/1e6).toFixed(1)+'M':v>=1000?'₺'+(v/1000).toFixed(0)+'K':'₺'+v;})});
  ch2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:bLabels,datasets:ecDS},options:opts(function(v){return'₺'+v;})});
}
</script>
</body>
</html>
